<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Welcome to Recycle Rewards</title>
  <style>
    /* Basic Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #CFE6E3, #E0F2F1);
      color: #2C3E50;
      text-align: center;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    /* Optional Logo */
    .logo {
      width: 100px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.1rem;
      margin-bottom: 30px;
    }
    button {
      padding: 15px 30px;
      font-size: 1.2rem;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #43A047;
    }
  </style>
</head>
<body>

  <img src="assets/icons/logo.png" alt="Recycle Rewards Logo" class="logo" />
  <h1>Welcome to Recycle Rewards</h1>
  <p>Earn rewards while saving the planet by recycling everyday items.</p>
  <button onclick="window.location.href='views/login.html'">Get Started</button>
</body>
</html>
